  <!-- 首页封面区域 -->
  <div id="home-page" class="min-h-screen flex flex-col justify-center items-center px-4 py-10 text-center">
    <div class="w-full max-w-xl rounded-2xl overflow-hidden shadow-xl mb-8">
      <img id="cover-img" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98r/pingpong-cartoon.jpg~tplv-a9rns2rl98r-image.image" alt="乒乓小将切磋漫画" class="w-full h-auto">
    </div>

    <h1 class="text-[clamp(1.8rem,5vw,2.8rem)] font-bold mb-4">乒乓人的专属MBTI测试</h1>
    <p class="text-gray-600 text-base md:text-lg mb-3">30道题，5分钟情景选择题，快速判断你的专属打球人格</p>
    <p class="text-gray-500 mb-10">
      <i class="fa-solid fa-users mr-1"></i>已有 <span id="test-num">21945</span> 人测试
    </p>

    <button id="btn-start-test" class="btn-start">
      <i class="fa-solid fa-play-circle mr-2"></i>开始测试
    </button>

    <div class="mt-auto pt-12 text-sm text-gray-400">
      结果仅供娱乐参考
    </div>
  </div>

  <!-- 答题页面 -->
  <div id="question-page" class="hidden max-w-2xl mx-auto px-4 py-10">
    <div class="card-box">
      <div class="flex justify-between items-center mb-4">
        <span id="module-name" class="text-main font-semibold"></span>
        <span id="progress-text" class="text-sm text-gray-500"></span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
        <div id="progress-bar" class="bg-main h-2 rounded-full transition-all"></div>
      </div>

      <h3 id="question-title" class="text-xl font-bold mb-6"></h3>
      <div id="option-list" class="space-y-3 mb-8"></div>

      <div class="flex justify-between">
        <button id="prev-q" class="px-5 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-40" disabled>
          <i class="fa-solid fa-chevron-left mr-1"></i>上一题
        </button>
        <button id="next-q" class="px-5 py-2 bg-main text-white rounded-lg hover:opacity-90 disabled:opacity-40">
          下一题<i class="fa-solid fa-chevron-right ml-1"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- 结果弹窗 -->
  <div id="result-modal" class="hidden fixed inset-0 z-[999] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-2xl overflow-hidden relative">
      <button id="close-result" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 text-xl z-10">
        <i class="fa-solid fa-xmark"></i>
      </button>

      <div class="p-6 md:p-8 result-scroll" id="result-container">
        <div id="share-wrap">
          <h2 class="text-2xl font-bold text-center mb-4">你的乒乓人格测试结果</h2>
          <div id="free-brief-desc" class="mb-6 border-b pb-6"></div>

          <div id="pay-overlay" class="pay-mask absolute inset-0 flex flex-col items-center justify-center text-white p-6 text-center">
            <h3 class="text-xl font-bold mb-3">解锁完整1000字深度报告</h3>
            <p class="mb-6 opacity-90">专属训练方案+实战套路+器材推荐完整解析</p>
            <button id="pay-btn-unlock" class="bg-main px-8 py-3 rounded-full font-bold text-lg">
              仅需 9.9 元立即解锁
            </button>
          </div>

          <div id="full-long-report" class="hidden mt-6 whitespace-pre-line"></div>

          <div class="mt-8 pt-6 border-t">
            <p class="text-center text-gray-600 mb-3">分享朋友圈，好友扫码立即测试</p>
            <div id="qrcode-box" class="flex justify-center"></div>
            <div class="flex justify-center gap-4 mt-4 flex-wrap">
              <button id="save-share-img" class="px-4 py-2 border border-main text-main rounded-lg">
                <i class="fa-solid fa-download mr-1"></i>保存分享图
              </button>
              <button id="restart-test" class="px-4 py-2 bg-main text-white rounded-lg">
                <i class="fa-solid fa-redo mr-1"></i>重新测试
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 支付成功弹窗 -->
  <div id="pay-success-modal" class="hidden fixed inset-0 bg-black/50 z-[1000] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-8 text-center max-w-sm w-full">
      <div class="text-5xl text-green-500 mb-4"><i class="fa-solid fa-check-circle"></i></div>
      <h3 class="text-xl font-bold mb-2">支付成功</h3>
      <p class="text-gray-600 mb-6">完整深度报告已解锁，向下滑动查看全部内容</p>
      <button id="close-pay-success" class="px-6 py-2 bg-main text-white rounded-lg">确定查看报告</button>
    </div>
  </div>

  <script src="./script.js"></script>
